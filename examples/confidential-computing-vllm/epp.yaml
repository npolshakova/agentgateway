apiVersion: v1
kind: ServiceAccount
metadata:
  name: confidential-vllm-epp
  namespace: confidential-vllm
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: confidential-vllm-epp-pods
  namespace: confidential-vllm
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: confidential-vllm-epp-inference
  namespace: confidential-vllm
rules:
- apiGroups: ["inference.networking.k8s.io"]
  resources: ["inferencepools"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["inference.networking.x-k8s.io"]
  resources: ["inferenceobjectives", "inferencemodelrewrites"]
  verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: confidential-vllm-epp-pods
  namespace: confidential-vllm
subjects:
- kind: ServiceAccount
  name: confidential-vllm-epp
  namespace: confidential-vllm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: confidential-vllm-epp-pods
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: confidential-vllm-epp-inference
  namespace: confidential-vllm
subjects:
- kind: ServiceAccount
  name: confidential-vllm-epp
  namespace: confidential-vllm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: confidential-vllm-epp-inference
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: confidential-vllm-epp
  namespace: confidential-vllm
data:
  default-plugins.yaml: |
    apiVersion: inference.networking.x-k8s.io/v1alpha1
    kind: EndpointPickerConfig
    plugins:
    - type: queue-scorer
    - type: kv-cache-utilization-scorer
    - type: prefix-cache-scorer
    - type: metrics-data-source
      parameters:
        scheme: "http"
        path: "/metrics"
        insecureSkipVerify: true
    - type: core-metrics-extractor
    schedulingProfiles:
    - name: default
      plugins:
      - pluginRef: queue-scorer
        weight: 2
      - pluginRef: kv-cache-utilization-scorer
        weight: 2
      - pluginRef: prefix-cache-scorer
        weight: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: confidential-vllm-epp
  namespace: confidential-vllm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: confidential-vllm-epp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: confidential-vllm-epp
        app.kubernetes.io/part-of: confidential-vllm
    spec:
      serviceAccountName: confidential-vllm-epp
      terminationGracePeriodSeconds: 130
      containers:
      - name: epp
        image: registry.k8s.io/gateway-api-inference-extension/epp:v1.5.0
        imagePullPolicy: IfNotPresent
        args:
        - --pool-name
        - confidential-vllm
        - --pool-namespace
        - confidential-vllm
        - --pool-group
        - inference.networking.k8s.io
        - --zap-encoder
        - json
        - --config-file
        - /config/default-plugins.yaml
        - --tracing=false
        - --metrics-endpoint-auth=false
        ports:
        - name: grpc
          containerPort: 9002
        - name: grpc-health
          containerPort: 9003
        - name: metrics
          containerPort: 9090
        livenessProbe:
          grpc:
            port: 9003
            service: inference-extension
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          grpc:
            port: 9003
            service: inference-extension
          periodSeconds: 2
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            memory: 1Gi
        volumeMounts:
        - name: plugins-config
          mountPath: /config
      volumes:
      - name: plugins-config
        configMap:
          name: confidential-vllm-epp
---
apiVersion: v1
kind: Service
metadata:
  name: confidential-vllm-epp
  namespace: confidential-vllm
spec:
  selector:
    app.kubernetes.io/name: confidential-vllm-epp
  ports:
  - name: grpc-ext-proc
    port: 9002
    targetPort: grpc
  - name: http-metrics
    port: 9090
    targetPort: metrics

