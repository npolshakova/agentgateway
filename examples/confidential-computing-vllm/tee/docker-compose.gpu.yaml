services:
  vllm:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
    command:
    - --model
    - ${MODEL_ID:-Qwen/Qwen2.5-7B-Instruct}
    - --served-model-name
    - confidential-vllm
    - --host
    - 0.0.0.0
    - --port
    - "8000"
    - --max-model-len
    - "4096"
    environment:
    - HF_TOKEN=${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            capabilities: [gpu]
