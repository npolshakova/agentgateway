frontendPolicies:
  accessLog:
    add:
      user: request.headers["user-agent"]

llm:
  policies:
    guardrails:
      request:
      - regex:
          action: reject
          rules:
          - builtin: email
        rejection:
          status: 400
    cors:
      allowOrigins:
        - http://localhost:15000
    localRateLimit:
    - type: tokens
      fillInterval: 1s
      tokensPerFill: 10
      maxTokens: 100
    jwtAuth:
      issuer: agentgateway.dev
      audiences: [test.agentgateway.dev]
      jwks: '{"keys":[]}'
    authorization:
      rules:
      - 'jwt.email.endsWith("@example.com")'
  models:
  - name: claude-3-haiku
    provider: anthropic
    params:
      model: claude-haiku-4-5-20251001
      apiKey: "sk-123"
      baseUrl: https://anthropic.internal/v1
      tokenize: true
    responseHeaders:
      remove:
      - server
    health:
      unhealthyExpression: "response.code >= 500 || response.code == 429"
      eviction:
        duration: 30s
    matches:
    - headers:
      - name: "X-Org"
        value:
          exact: "engineering"
    promptCaching:
      cacheSystem: true
      cacheMessages: true
      minTokens: 1
    guardrails:
      request:
      - regex:
          action: reject
          rules:
          - builtin: creditCard
      response:
      - regex:
          action: mask
          rules:
          - builtin: phoneNumber
  - name: '*'
    provider: vertex
    params:
      model: claude-haiku-4-5-20251001
      apiKey: "sk-123"
      vertexRegion: global
      vertexProject: my-vertex-project
  - name: gpt-7-max
    provider: azure
    params:
      model: gpt-3.5-turbo
      azureResourceName: my-azure-openai-endpoint
      azureResourceType: openAI
      azureApiVersion: v1
  - name: gpt-3.5-turbo
    provider: openai
  - name: llama-3.1-8b-instant
    provider: groq
  - name: fireworks-llama
    provider: fireworks
