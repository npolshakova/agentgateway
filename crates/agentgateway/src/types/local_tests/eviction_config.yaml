# yaml-language-server: $schema=../../schema/local.json
# Route with eviction policy: CEL unhealthy expression and eviction duration.
binds:
- port: 3000
  listeners:
  - routes:
    - policies:
        eviction:
          unhealthyExpression: "response.code >= 500 || response.code == 429"
          evictionDuration: 30s
      backends:
      - mcp:
          targets:
          - name: everything
            stdio:
              cmd: npx
              args: ["@modelcontextprotocol/server-everything"]
