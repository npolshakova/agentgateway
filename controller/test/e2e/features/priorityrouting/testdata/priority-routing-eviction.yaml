apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin-primary
  namespace: agentgateway-base
  labels:
    app.kubernetes.io/name: httpbin-primary
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: httpbin-primary
  template:
    metadata:
      labels:
        app.kubernetes.io/name: httpbin-primary
    spec:
      containers:
      - name: httpbin
        image: mccutchen/go-httpbin:v2.15.0
        ports:
        - containerPort: 8080
        env:
        - name: USE_REAL_HOSTNAME
          value: "true"
        readinessProbe:
          httpGet:
            path: /status/200
            port: 8080
          periodSeconds: 1
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin-primary
  namespace: agentgateway-base
spec:
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  selector:
    app.kubernetes.io/name: httpbin-primary
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin-fallback
  namespace: agentgateway-base
  labels:
    app.kubernetes.io/name: httpbin-fallback
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: httpbin-fallback
  template:
    metadata:
      labels:
        app.kubernetes.io/name: httpbin-fallback
    spec:
      containers:
      - name: httpbin
        image: mccutchen/go-httpbin:v2.15.0
        ports:
        - containerPort: 8080
        env:
        - name: USE_REAL_HOSTNAME
          value: "true"
        readinessProbe:
          httpGet:
            path: /status/200
            port: 8080
          periodSeconds: 1
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin-fallback
  namespace: agentgateway-base
spec:
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  selector:
    app.kubernetes.io/name: httpbin-fallback
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: priority-eviction-backend
  namespace: agentgateway-base
spec:
  endpointGroup:
    endpoints:
    # Priority 0 – primary (will be scaled down mid-test to trigger eviction)
    - host: httpbin-primary.agentgateway-base.svc.cluster.local
      port: 8080
    # Priority 1 – fallback
    - host: httpbin-fallback.agentgateway-base.svc.cluster.local
      port: 8080
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: priority-eviction-policy
  namespace: agentgateway-base
spec:
  targetRefs:
  - group: agentgateway.dev
    kind: AgentgatewayBackend
    name: priority-eviction-backend
  backend:
    health:
      unhealthyCondition: "response.code >= 500"
      eviction:
        duration: 60s
        consecutiveFailures: 3
        restoreHealth: 100
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: priority-eviction-route
  namespace: agentgateway-base
spec:
  parentRefs:
  - name: gateway
  hostnames:
  - "priority-eviction.example.com"
  rules:
  - backendRefs:
    - name: priority-eviction-backend
      kind: AgentgatewayBackend
      group: agentgateway.dev
