apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-selected
  namespace: discoveryns-selected
spec:
  parentRefs:
    - name: gateway
      namespace: discoveryns-selected
  hostnames:
    - "selected.example.com"
  rules:
    - backendRefs:
        - name: backend
          port: 80
