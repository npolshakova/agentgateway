apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hostrewrite-svc-default
  namespace: agentgateway-base
spec:
  parentRefs:
    - name: gateway
  hostnames:
    - "svc-default.hostrewrite.test"
  rules:
    - backendRefs:
        - name: backend
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hostrewrite-svc-none
  namespace: agentgateway-base
spec:
  parentRefs:
    - name: gateway
  hostnames:
    - "svc-none.hostrewrite.test"
  rules:
    - backendRefs:
        - name: backend
          port: 80
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: hostrewrite-svc-none
  namespace: agentgateway-base
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: hostrewrite-svc-none
  traffic:
    hostRewrite:
      mode: None
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hostrewrite-svc-auto
  namespace: agentgateway-base
spec:
  parentRefs:
    - name: gateway
  hostnames:
    - "svc-auto.hostrewrite.test"
  rules:
    - backendRefs:
        - name: backend
          port: 80
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: hostrewrite-svc-auto
  namespace: agentgateway-base
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: hostrewrite-svc-auto
  traffic:
    hostRewrite:
      mode: Auto
