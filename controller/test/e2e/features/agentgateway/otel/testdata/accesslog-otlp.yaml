apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: agw-accesslog
  namespace: agentgateway-base
spec:
  targetRefs:
    - kind: Gateway
      name: gateway
      group: gateway.networking.k8s.io
  frontend:
    accessLog:
      otlp:
        backendRef:
          name: opentelemetry-collector
          namespace: default
          port: 4317
        protocol: GRPC
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httpbin-route-accesslog
  namespace: agentgateway-base
spec:
  hostnames:
    - www.example.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: backend
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /status/200
---
