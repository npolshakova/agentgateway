apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayParameters
metadata:
  name: workload-kind-deployment
  namespace: agentgateway-base
spec:
  workload:
    kind: Deployment
  podDisruptionBudget:
    metadata:
      labels:
        daemonset-pdb-e2e: from-overlay
    spec:
      minAvailable: 1
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayParameters
metadata:
  name: workload-kind-daemonset
  namespace: agentgateway-base
spec:
  workload:
    kind: DaemonSet
  daemonSet:
    metadata:
      labels:
        daemonset-e2e: from-overlay
      annotations:
        daemonset-e2e: from-overlay
    spec:
      updateStrategy:
        type: RollingUpdate
      template:
        spec:
          tolerations:
          - operator: Exists
  podDisruptionBudget:
    metadata:
      labels:
        daemonset-pdb-e2e: from-overlay
    spec:
      minAvailable: 1
---
kind: Gateway
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: daemonset-gateway
  namespace: agentgateway-base
spec:
  gatewayClassName: agentgateway
  infrastructure:
    parametersRef:
      group: agentgateway.dev
      kind: AgentgatewayParameters
      name: workload-kind-deployment
  listeners:
  - protocol: HTTP
    port: 8080
    name: http
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: daemonset-gateway-route
  namespace: agentgateway-base
spec:
  parentRefs:
  - name: daemonset-gateway
  hostnames:
  - daemonset.example.com
  rules:
  - backendRefs:
    - name: backend
      port: 80
