# Regenerate this intentionally invalid Dynamic CA certificate source fixture with a leaf cert/key:
#   openssl ecparam -name prime256v1 -genkey -noout -out dynamic-ca-cert-root.key
#   openssl req -x509 -new -key dynamic-ca-cert-root.key -sha256 -days 3650 -subj "/CN=agentgateway.dev" \
#     -addext "keyUsage=critical,keyCertSign" \
#     -addext "basicConstraints=critical,CA:TRUE,pathlen:1" \
#     -out dynamic-ca-cert-root.crt
#   openssl ecparam -name prime256v1 -genkey -noout -out dynamic-ca-cert-invalid-ca.key
#   openssl req -new -key dynamic-ca-cert-invalid-ca.key -subj "/CN=localhost" -out dynamic-ca-cert-invalid-ca.csr
#   printf '%s\n' \
#     'keyUsage=critical,digitalSignature,keyEncipherment' \
#     'extendedKeyUsage=serverAuth,clientAuth' \
#     'subjectAltName=DNS:localhost' > dynamic-ca-cert-invalid-ca.ext
#   openssl x509 -req -in dynamic-ca-cert-invalid-ca.csr -CA dynamic-ca-cert-root.crt -CAkey dynamic-ca-cert-root.key -CAcreateserial \
#     -days 3650 -sha256 -extfile dynamic-ca-cert-invalid-ca.ext -out dynamic-ca-cert-invalid-ca.crt
# Then paste dynamic-ca-cert-invalid-ca.crt into stringData.tls.crt and dynamic-ca-cert-invalid-ca.key into stringData.tls.key.
apiVersion: v1
kind: Secret
metadata:
  name: dynamic-ca-cert-invalid-ca
  namespace: agentgateway-base
type: kubernetes.io/tls
stringData:
  tls.crt: |
