---
kind: Gateway
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: dynamic-ca-cert-invalid-ca-gateway
  namespace: agentgateway-base
spec:
  gatewayClassName: agentgateway
  listeners:
    - protocol: HTTPS
      port: 443
      name: https
      hostname: invalid.dynamic-ca-cert.example.com
      tls:
        mode: Terminate
        options:
          agentgateway.dev/tls-certificate-source: DYNAMIC_CA
        certificateRefs:
          - name: dynamic-ca-cert-invalid-ca
            kind: Secret
