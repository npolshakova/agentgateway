apiVersion: v1
kind: ConfigMap
metadata:
  name: catalog
  namespace: default
data:
  catalog.json: |
    {
      "providers": {
        "openai": {
          "models": {
            "gpt-4o-mini": {
              "rates": {
                "input": "1000000",
                "output": "1000000"
              }
            }
          }
        }
      }
    }
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayParameters
metadata:
  name: params
  namespace: default
spec:
  logging:
    level: info
  modelCatalog:
    sources:
    - configMap:
        name: catalog
        key: catalog.json
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gw
  namespace: default
spec:
  gatewayClassName: agentgateway
  infrastructure:
    parametersRef:
      group: agentgateway.dev
      kind: AgentgatewayParameters
      name: params
  listeners:
  - protocol: HTTP
    port: 80
    name: http
    allowedRoutes:
      namespaces:
        from: All
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: openai-backend
  namespace: default
spec:
  ai:
    provider:
      openai:
        model: gpt-4o-mini
      host: ai-testbox.default.svc.cluster.local
      port: 9234
  policies:
    auth:
      key: openai-key
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm
  namespace: default
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: gw
    namespace: default
  rules:
  - name: openai
    backendRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: openai-backend
    matches:
    - path:
        type: PathPrefix
        value: /v1/chat/completions
