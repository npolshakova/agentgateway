apiVersion: v1
kind: ConfigMap
metadata:
  name: catalog-alt
  namespace: default
data:
  catalog.json: |
    {
      "providers": {
        "openai": {
          "models": {
            "gpt-4o-mini": {
              "rates": {
                "input": "1",
                "output": "1"
              }
            }
          }
        }
      }
    }
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayParameters
metadata:
  name: params-alt
  namespace: default
spec:
  logging:
    level: info
  modelCatalog:
    sources:
    - configMap:
        name: catalog-alt
        key: catalog.json
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gw-alt
  namespace: default
spec:
  gatewayClassName: agentgateway
  infrastructure:
    parametersRef:
      group: agentgateway.dev
      kind: AgentgatewayParameters
      name: params-alt
  listeners:
  - protocol: HTTP
    port: 80
    name: http
    allowedRoutes:
      namespaces:
        from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-alt
  namespace: default
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: gw-alt
    namespace: default
  rules:
  - name: openai
    backendRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: openai-backend
    matches:
    - path:
        type: PathPrefix
        value: /v1/chat/completions
