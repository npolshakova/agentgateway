apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headercase
  namespace: agentgateway-base
spec:
  parentRefs:
    - name: gateway
  hostnames:
    - "headercase.example.com"
  rules:
    - backendRefs:
        - name: backend
          port: 18081
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: headercase-preserve
  namespace: agentgateway-base
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
  frontend:
    http:
      http1HeaderCase: Preserve
