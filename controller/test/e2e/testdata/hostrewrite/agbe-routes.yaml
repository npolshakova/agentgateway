apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: hostrewrite-static-backend
  namespace: agentgateway-base
spec:
  static:
    host: backend.agentgateway-base.svc.cluster.local
    port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hostrewrite-agbe-default
  namespace: agentgateway-base
spec:
  parentRefs:
    - name: gateway
  hostnames:
    - "agbe-default.hostrewrite.test"
  rules:
    - backendRefs:
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: hostrewrite-static-backend
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hostrewrite-agbe-none
  namespace: agentgateway-base
spec:
  parentRefs:
    - name: gateway
  hostnames:
    - "agbe-none.hostrewrite.test"
  rules:
    - backendRefs:
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: hostrewrite-static-backend
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: hostrewrite-agbe-none
  namespace: agentgateway-base
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: hostrewrite-agbe-none
  traffic:
    hostRewrite:
      mode: None
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hostrewrite-agbe-auto
  namespace: agentgateway-base
spec:
  parentRefs:
    - name: gateway
  hostnames:
    - "agbe-auto.hostrewrite.test"
  rules:
    - backendRefs:
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: hostrewrite-static-backend
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: hostrewrite-agbe-auto
  namespace: agentgateway-base
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: hostrewrite-agbe-auto
  traffic:
    hostRewrite:
      mode: Auto
