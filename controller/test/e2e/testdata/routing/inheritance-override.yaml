apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: inheritance
  namespace: agentgateway-base
spec:
  parentRefs:
    - name: gateway
  hostnames:
    - "inheritance.example.com"
  rules:
    - backendRefs:
        - name: backend
          port: 80
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: inheritance-gateway
  namespace: agentgateway-base
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: gateway
  strategy:
    inheritance: Override
  traffic:
    headerModifiers:
      response:
        set:
        - name: x-policy-inheritance
          value: gateway
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: inheritance-route
  namespace: agentgateway-base
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: inheritance
  traffic:
    headerModifiers:
      response:
        set:
        - name: x-policy-inheritance
          value: route
