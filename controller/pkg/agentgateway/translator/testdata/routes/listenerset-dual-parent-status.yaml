apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: dual-parent
  namespace: default
spec:
  gatewayClassName: agentgateway
  allowedListeners:
    namespaces:
      from: Same
  listeners:
  - name: gateway-listener
    hostname: gateway.example.com
    port: 80
    protocol: HTTP
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: dual-parent-listenerset
  namespace: default
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: dual-parent
  listeners:
  - name: listenerset-listener
    hostname: route.example.com
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dual-parent-route
  namespace: default
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: dual-parent
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: dual-parent-listenerset
  hostnames:
  - route.example.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: infra-backend-v1
      port: 8080

---
# Output
output:
