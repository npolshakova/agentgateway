apiVersion: v1
kind: Service
metadata:
  name: denied-svc
  namespace: backend-ns
spec:
  ports:
    - port: 9002
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: denied-service-source
  namespace: default
spec:
  targetRefs:
    - kind: HTTPRoute
      name: test
      group: gateway.networking.k8s.io
  traffic:
    extAuth:
      grpc: {}
      backendRef:
        name: denied-svc
        namespace: backend-ns
        port: 9002
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: denied-service-backend-policy
  namespace: backend-ns
spec:
  targetRefs:
    - kind: Service
      name: denied-svc
      group: ""
  backend:
    health:
      unhealthyCondition: response.code >= 500

---
