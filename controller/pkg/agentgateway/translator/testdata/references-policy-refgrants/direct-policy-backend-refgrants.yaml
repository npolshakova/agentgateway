apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: allowed-backend
  namespace: backend-ns
spec:
  static:
    host: allowed.example.com
    port: 80
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: denied-backend
  namespace: backend-ns
spec:
  static:
    host: denied.example.com
    port: 80
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-policy-backend
  namespace: backend-ns
spec:
  from:
    - group: agentgateway.dev
      kind: AgentgatewayPolicy
      namespace: default
  to:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: allowed-backend
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: allowed-policy
  namespace: default
spec:
  targetRefs:
    - kind: HTTPRoute
      name: test
      group: gateway.networking.k8s.io
  traffic:
    extAuth:
      grpc: {}
      backendRef:
        name: allowed-backend
        namespace: backend-ns
        group: agentgateway.dev
        kind: AgentgatewayBackend
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: denied-policy
  namespace: default
spec:
  targetRefs:
    - kind: HTTPRoute
      name: test
      group: gateway.networking.k8s.io
  traffic:
    extAuth:
      grpc: {}
      backendRef:
        name: denied-backend
        namespace: backend-ns
        group: agentgateway.dev
        kind: AgentgatewayBackend

---
# Output
output:
- gateway:
    Name: test
    Namespace: default
  resource:
    backend:
      key: backend-ns/allowed-backend
      name:
        name: allowed-backend
        namespace: backend-ns
      static:
        host: allowed.example.com
        port: 80
- gateway:
    Name: test
    Namespace: default
  resource:
    policy:
      key: traffic/default/allowed-policy:extauth:default/test
      name:
        kind: AgentgatewayPolicy
        name: allowed-policy
        namespace: default
      target:
        route:
          kind: HTTPRoute
          name: test
          namespace: default
      traffic:
        extAuthz:
          grpc: {}
          target:
            backend: backend-ns/allowed-backend
- gateway:
    Name: test
    Namespace: default
  resource:
    policy:
      key: traffic/default/denied-policy:extauth:default/test
      name:
        kind: AgentgatewayPolicy
        name: denied-policy
        namespace: default
      target:
        route:
          kind: HTTPRoute
          name: test
          namespace: default
      traffic:
        extAuthz:
          grpc: {}
status:
- apiVersion: agentgateway.dev/v1alpha1
  kind: AgentgatewayPolicy
  metadata:
    name: allowed-policy
    namespace: default
  spec: null
  status:
    ancestors:
    - ancestorRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: test
        namespace: default
      conditions:
      - lastTransitionTime: fake
        message: Policy accepted
        reason: Valid
        status: "True"
        type: Accepted
      - lastTransitionTime: fake
        message: Attached to all targets
        reason: Attached
        status: "True"
        type: Attached
      controllerName: agentgateway.dev/agentgateway
- apiVersion: agentgateway.dev/v1alpha1
  kind: AgentgatewayPolicy
  metadata:
    name: denied-policy
    namespace: default
  spec: null
  status:
    ancestors:
    - ancestorRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: test
        namespace: default
      conditions:
      - lastTransitionTime: fake
        message: 'failed to build extAuth: backendRef backend-ns/denied-backend not
          accessible to an AgentgatewayPolicy in namespace "default" (missing a ReferenceGrant?)'
        reason: PartiallyValid
        status: "True"
        type: Accepted
      controllerName: agentgateway.dev/agentgateway
