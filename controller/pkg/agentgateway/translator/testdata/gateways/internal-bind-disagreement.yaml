apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: example
  namespace: default
  annotations:
    agentgateway.dev/internal-ports: "8080"
spec:
  gatewayClassName: agentgateway
  listeners:
    - name: gw-8080
      protocol: HTTP
      port: 8080
      hostname: a.example.com
  allowedListeners:
    namespaces:
      from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: foo
  namespace: default
spec:
  parentRef:
    name: example
    kind: Gateway
    group: gateway.networking.k8s.io
  listeners:
    - name: ls-8080
      protocol: HTTP
      port: 8080
      hostname: b.example.com
      allowedRoutes:
        namespaces:
          from: All

---
# Output
