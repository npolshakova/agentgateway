apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: test-gateway
  namespace: default
  annotations:
    agentgateway.dev/internal-ports: "8080"
spec:
  gatewayClassName: agentgateway
  listeners:
    - name: public
      port: 80
      protocol: HTTP
    - name: internal
      port: 8080
      protocol: HTTP

