apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: test-gateway
  namespace: default
spec:
  gatewayClassName: agentgateway
  tls:
    frontend:
      default:
        validation:
          caCertificateRefs:
            - name: ca-cert
              kind: ConfigMap
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        options:
          agentgateway.dev/tls-certificate-source: DYNAMIC_CA
        certificateRefs:
          - name: tls
            kind: Secret
---
kind: Secret
apiVersion: v1
metadata:
  name: tls
  namespace: default
type: kubernetes.io/tls
data:
  tls.crt: 
  tls.key: 
