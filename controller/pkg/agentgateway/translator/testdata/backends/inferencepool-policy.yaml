apiVersion: inference.networking.k8s.io/v1
kind: InferencePool
metadata:
  name: gateway-pool
  namespace: default
spec:
  appProtocol: kubernetes.io/h2c
  endpointPickerRef:
    failureMode: FailClose
    group: ""
    kind: Service
    name: gateway-pool-endpoint-picker
    port:
      number: 9002
  selector:
    matchLabels:
      app: gateway
  targetPorts:
    - number: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-pool-endpoint-picker
  namespace: default
spec:
  ports:
    - port: 9002
      protocol: TCP
  selector:
    app: gateway
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: pool-rl-policy
  namespace: default
spec:
  targetRefs:
  - group: inference.networking.k8s.io
    kind: InferencePool
    name: gateway-pool
  traffic:
    rateLimit:
      local:
        - requests: 100
          unit: Minutes
          burst: 10

---
# Output
output:
- gateway:
    Name: basic
    Namespace: default
  resource:
    policy:
      backend:
        inferenceRouting:
          endpointPicker:
            port: 9002
            service:
              hostname: gateway-pool-endpoint-picker.default.svc.cluster.local
              namespace: default
          failureMode: FAIL_CLOSED
      key: default/gateway-pool:inference
      name:
        kind: InferencePool
        name: gateway-pool
        namespace: default
      target:
        service:
          hostname: gateway-pool.default.inference.cluster.local
          namespace: default
- gateway:
    Name: basic
    Namespace: default
  resource:
    policy:
      backend:
        backendTls:
          verification: INSECURE_ALL
      key: default/gateway-pool:inferencetls
      name:
        kind: InferencePool
        name: gateway-pool
        namespace: default
      target:
        service:
          hostname: gateway-pool-endpoint-picker.default.svc.cluster.local
          namespace: default
          port: 9002
- gateway:
    Name: basic
    Namespace: default
  resource:
    policy:
      key: traffic/default/pool-rl-policy:rl-local:default/gateway-pool.default.inference.cluster.local
      name:
        kind: AgentgatewayPolicy
        name: pool-rl-policy
        namespace: default
      target:
        service:
          hostname: gateway-pool.default.inference.cluster.local
          namespace: default
      traffic:
        localRateLimit:
          fillInterval: 60s
          maxTokens: "110"
          tokensPerFill: "100"
- canonical: true
  hostname: gateway-pool-endpoint-picker.default.svc.cluster.local
  name: gateway-pool-endpoint-picker
  namespace: default
  ports:
  - servicePort: 9002
- hostname: gateway-pool.default.inference.cluster.local
  name: gateway-pool
  namespace: default
  ports:
  - appProtocol: HTTP2
    servicePort: 8080
    targetPort: 8080
status:
- apiVersion: inference.networking.k8s.io/v1
  kind: InferencePool
  metadata:
    name: gateway-pool
    namespace: default
  spec: null
  status:
    parents:
    - conditions:
      - lastTransitionTime: fake
        message: InferencePool has been accepted by controller agentgateway.dev/agentgateway
        reason: Accepted
        status: "True"
        type: Accepted
      - lastTransitionTime: fake
        message: All InferencePool references have been resolved
        reason: ResolvedRefs
        status: "True"
        type: ResolvedRefs
      controllerName: agentgateway.dev/agentgateway
      parentRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: basic
        namespace: default
