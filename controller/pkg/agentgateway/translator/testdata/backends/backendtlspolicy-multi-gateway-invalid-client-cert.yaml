apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: mtls-invalid
  namespace: default
spec:
  gatewayClassName: agentgateway
  tls:
    backend:
      clientCertificateRef:
        group: ""
        kind: Secret
        name: missing-client-cert
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: no-mtls
  namespace: default
spec:
  gatewayClassName: agentgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: shared-backend
  namespace: default
spec:
  ports:
    - name: https
      port: 443
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mtls-invalid-route
  namespace: default
spec:
  parentRefs:
    - name: mtls-invalid
  rules:
    - backendRefs:
        - name: shared-backend
          port: 443
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: no-mtls-route
  namespace: default
spec:
  parentRefs:
    - name: no-mtls
  rules:
    - backendRefs:
        - name: shared-backend
          port: 443
---
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: shared-backend-tls
  namespace: default
spec:
  targetRefs:
    - name: shared-backend
      kind: Service
      group: ""
      sectionName: https
  validation:
    hostname: shared-backend.default.svc.cluster.local
    wellKnownCACertificates: System

---
