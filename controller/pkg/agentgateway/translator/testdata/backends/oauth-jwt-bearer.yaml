    Name: basic
    Namespace: default
  resource:
    backend:
      inlinePolicies:
      - auth:
          oauthTokenExchange:
            clientAuth:
              clientId: public-client
              method: CLIENT_SECRET_POST
            grantType: JWT_BEARER
            subjectToken:
              source:
                expression: request.headers["x-client-assertion"]
            tokenEndpoint:
              backend: default/token-endpoint
      key: default/static-backend
      name:
        name: static-backend
        namespace: default
      static:
        host: example.com
        port: 8888
- gateway:
