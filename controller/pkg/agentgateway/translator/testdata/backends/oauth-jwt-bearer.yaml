apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  namespace: default
  name: token-endpoint
spec:
  static:
    host: sts.example.com
    port: 443
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  namespace: default
  name: static-backend
spec:
  static:
    host: example.com
    port: 8888
  policies:
    auth:
      oauthTokenExchange:
        tokenEndpoint:
          group: agentgateway.dev
          kind: AgentgatewayBackend
          name: token-endpoint
        grantType: JwtBearer
        subjectToken:
          source:
            expression: request.headers["x-client-assertion"]
        clientAuth:
          clientId: public-client
          method: ClientSecretPost
---
# Output
output:
