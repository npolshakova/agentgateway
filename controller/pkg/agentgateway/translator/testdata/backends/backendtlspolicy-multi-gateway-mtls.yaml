apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: internal-gateway
  namespace: default
spec:
  gatewayClassName: agentgateway
  tls:
    backend:
      clientCertificateRef:
        group: ""
        kind: Secret
        name: client-cert-a
  listeners:
    - name: https
      protocol: HTTP
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: privatelink-gateway
  namespace: default
spec:
  gatewayClassName: agentgateway
  tls:
    backend:
      clientCertificateRef:
        group: ""
        kind: Secret
        name: client-cert-b
  listeners:
    - name: grpc
      protocol: HTTP
      port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: shared-backend
  namespace: default
spec:
  ports:
    - name: https
      port: 443
    - name: grpc
      port: 444
---
apiVersion: v1
kind: Secret
metadata:
  name: client-cert-a
  namespace: default
type: kubernetes.io/tls
data:
  tls.crt: 
  tls.key: 
---
apiVersion: v1
kind: Secret
metadata:
  name: client-cert-b
  namespace: default
type: kubernetes.io/tls
data:
  tls.crt: 
  tls.key: 
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: internal-route
  namespace: default
spec:
  parentRefs:
    - name: internal-gateway
  rules:
    - backendRefs:
        - name: shared-backend
          port: 443
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: privatelink-route
  namespace: default
spec:
  parentRefs:
    - name: privatelink-gateway
  rules:
    - backendRefs:
        - name: shared-backend
          port: 444
---
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: shared-backend-tls
  namespace: default
spec:
  targetRefs:
    - name: shared-backend
      kind: Service
      group: ""
      sectionName: https
    - name: shared-backend
      kind: Service
      group: ""
      sectionName: grpc
  validation:
    hostname: shared-backend.default.svc.cluster.local
    wellKnownCACertificates: System

