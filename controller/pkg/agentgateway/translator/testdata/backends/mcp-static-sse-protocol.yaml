apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  namespace: default
  name: mcp-static-sse
spec:
  mcp:
    targets:
    - name: sse-target
      static:
        host: mcp-server.example.com
        port: 8080
        path: /custom-sse
        protocol: SSE
