apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  namespace: default
  name: token-endpoint
spec:
  static:
    host: sts.example.com
    port: 443
---
apiVersion: v1
kind: Secret
metadata:
  namespace: default
  name: oauth-signing-key
data:
  signingKey: cGVtLXZhbHVl
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  namespace: default
  name: static-backend
spec:
  static:
    host: example.com
    port: 8888
  policies:
    auth:
      oauthTokenExchange:
        backendRef:
          group: agentgateway.dev
          kind: AgentgatewayBackend
          name: token-endpoint
        clientAuth:
          clientId: gateway
          method: PrivateKeyJwt
          privateKeyJwt:
            signingKeyRef:
              name: oauth-signing-key
            alg: ES256
            kid: key-1
            assertionAudience: https://sts.example.com/oauth/token

---
# Output
output:
