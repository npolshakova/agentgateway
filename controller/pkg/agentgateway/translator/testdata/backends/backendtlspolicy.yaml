apiVersion: v1
kind: Service
metadata:
  name: infra-backend-v1
  namespace: default
spec:
  ports:
    - name: https
      port: 443
---
apiVersion: v1
kind: Service
metadata:
  name: infra-backend-v2
  namespace: default
spec:
  ports:
    - name: https
      port: 443
---
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: test-tls
  namespace: default
spec:
  targetRefs:
    - name: infra-backend-v1
      kind: Service
      group: ""
      sectionName: https
  validation:
    hostname: example.com
    wellKnownCACertificates: System
    subjectAltNames:
      - type: "Hostname"
        hostname: "dce.example.com"
      - type: "URI"
        uri: "spiffe://foo/bar"
---
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: test-tls-invalid
  namespace: default
spec:
  targetRefs:
    - name: infra-backend-v2
      kind: Service
      group: ""
  validation:
    hostname: example.com
    caCertificateRefs:
      - name: ca-cert-1
        group: ""
        kind: ConfigMap
---
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: default
  name: ca-cert-1
data:
  ca.crt: |-
    not valid!!!
---
# Output
output:
- gateway:
    Name: basic
    Namespace: default
  resource:
    policy:
      backend:
        backendTls:
          hostname: example.com
          root: aW52YWxpZA==
      key: default/test-tls-invalid:backend-tls:default/infra-backend-v2.default.svc.cluster.local
      name:
        kind: BackendTLSPolicy
        name: test-tls-invalid
        namespace: default
      target:
        service:
          hostname: infra-backend-v2.default.svc.cluster.local
          namespace: default
- gateway:
    Name: basic
    Namespace: default
  resource:
    policy:
      backend:
        backendTls:
          hostname: example.com
          verifySubjectAltNames:
          - dce.example.com
          - spiffe://foo/bar
      key: default/test-tls:backend-tls:default/infra-backend-v1.default.svc.cluster.local/443
      name:
        kind: BackendTLSPolicy
        name: test-tls
        namespace: default
      target:
        service:
          hostname: infra-backend-v1.default.svc.cluster.local
          namespace: default
          port: 443
- canonical: true
  hostname: infra-backend-v1.default.svc.cluster.local
  name: infra-backend-v1
  namespace: default
  ports:
  - appProtocol: TLS
    servicePort: 443
- canonical: true
  hostname: infra-backend-v2.default.svc.cluster.local
  name: infra-backend-v2
  namespace: default
  ports:
  - appProtocol: TLS
    servicePort: 443
status:
- apiVersion: gateway.networking.k8s.io/v1
  kind: BackendTLSPolicy
  metadata:
    name: test-tls
    namespace: default
  spec: null
  status:
    ancestors:
    - ancestorRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: basic
      conditions:
      - lastTransitionTime: fake
        message: Configuration is valid
        reason: Accepted
        status: "True"
        type: Accepted
      - lastTransitionTime: fake
        message: Configuration is valid
        reason: ResolvedRefs
        status: "True"
        type: ResolvedRefs
      controllerName: agentgateway.dev/agentgateway
- apiVersion: gateway.networking.k8s.io/v1
  kind: BackendTLSPolicy
  metadata:
    name: test-tls-invalid
    namespace: default
  spec: null
  status:
    ancestors:
    - ancestorRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: basic
      conditions:
      - lastTransitionTime: fake
        message: 'certificate invalid: invalid ca.crt in ConfigMap default/ca-cert-1:
          data does not contain any valid RSA or ECDSA certificates'
        reason: NoValidCACertificate
        status: "False"
        type: Accepted
      - lastTransitionTime: fake
        message: 'Certificate invalid: invalid ca.crt in ConfigMap default/ca-cert-1:
          data does not contain any valid RSA or ECDSA certificates'
        reason: InvalidCACertificateRef
        status: "False"
        type: ResolvedRefs
      controllerName: agentgateway.dev/agentgateway
