apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  namespace: default
  name: token-endpoint
spec:
  static:
    host: sts.example.com
    port: 443
---
apiVersion: v1
kind: Secret
metadata:
  namespace: default
  name: oauth-client
data:
  clientSecret: czNjcjN0
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  namespace: default
  name: static-backend
spec:
  static:
    host: example.com
    port: 8888
  policies:
    auth:
      oauthTokenExchange:
        backendRef:
          group: agentgateway.dev
          kind: AgentgatewayBackend
          name: token-endpoint
        path: /oauth/token
        grantType: TokenExchange
        subjectToken:
          source:
            header:
              name: Authorization
              prefix: "Bearer "
          tokenType: AccessToken
        actorToken:
          source:
            header:
              name: X-Actor-Token
          tokenType: Jwt
          mayAct: Required
        audiences:
        - api://payments
        scopes:
        - read:invoices
        - write:invoices
        resources:
        - https://payments.example.com
        requestedTokenType: AccessToken
        additionalParams:
          tenant: request.headers["x-tenant"]
        clientAuth:
          clientId: gateway
          secretRef:
            name: oauth-client
          method: ClientSecretBasic
        location:
          header:
            name: X-Forwarded-Access-Token
        cache:
          inMemory:
            maxEntries: 128
            defaultTtl: 120s
---
# Output
