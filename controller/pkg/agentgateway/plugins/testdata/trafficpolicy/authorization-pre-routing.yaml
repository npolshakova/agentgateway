apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: authorization-pre-routing
  namespace: default
spec:
  targetRefs:
  - kind: Gateway
    name: test
    group: gateway.networking.k8s.io
  traffic:
    phase: PreRouting
    authorization:
      policy:
        matchExpressions:
        - request.headers["x-pre-routing"] == "yes"

---
# Output
output:
- gateway:
    Name: test
    Namespace: default
  resource:
    policy:
      key: traffic/default/authorization-pre-routing:rbac:default/test
      name:
        kind: AgentgatewayPolicy
        name: authorization-pre-routing
        namespace: default
      target:
        gateway:
          name: test
          namespace: default
      traffic:
        authorization:
          allow:
          - request.headers["x-pre-routing"] == "yes"
        phase: GATEWAY
status:
- apiVersion: agentgateway.dev/v1alpha1
  kind: AgentgatewayPolicy
  metadata:
    name: authorization-pre-routing
    namespace: default
  spec: null
  status:
    ancestors:
    - ancestorRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: test
        namespace: default
      conditions:
      - lastTransitionTime: fake
        message: Policy accepted
        reason: Valid
        status: "True"
        type: Accepted
      - lastTransitionTime: fake
        message: Attached to all targets
        reason: Attached
        status: "True"
        type: Attached
      controllerName: agentgateway.dev/agentgateway
