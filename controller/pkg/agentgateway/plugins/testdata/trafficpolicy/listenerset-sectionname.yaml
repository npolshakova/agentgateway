apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: listenerset-gw
  namespace: default
spec:
  gatewayClassName: agentgateway
  allowedListeners:
    namespaces:
      from: All
  listeners:
  - name: http
    protocol: HTTP
    port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: my-listenerset
  namespace: default
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: listenerset-gw
  listeners:
  - name: extra
    protocol: HTTP
    port: 9090
    allowedRoutes:
      namespaces:
        from: All
  - name: other
    protocol: HTTP
    port: 9091
    allowedRoutes:
      namespaces:
        from: All
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: ls-section-policy
  namespace: default
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: my-listenerset
    sectionName: extra
  traffic:
    timeouts:
      request: 15s

---
# Output
output:
- gateway:
    Name: listenerset-gw
    Namespace: default
  resource:
    policy:
      key: traffic/default/ls-section-policy:timeout:default/my-listenerset/extra
      name:
        kind: AgentgatewayPolicy
        name: ls-section-policy
        namespace: default
      target:
        listenerSet:
          name: my-listenerset
          namespace: default
          section: extra
      traffic:
        timeout:
          request: 15s
status:
- apiVersion: agentgateway.dev/v1alpha1
  kind: AgentgatewayPolicy
  metadata:
    name: ls-section-policy
    namespace: default
  spec: null
  status:
    ancestors:
    - ancestorRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: listenerset-gw
        namespace: default
      conditions:
      - lastTransitionTime: fake
        message: Policy accepted
        reason: Valid
        status: "True"
        type: Accepted
      - lastTransitionTime: fake
        message: Attached to all targets
        reason: Attached
        status: "True"
        type: Attached
      controllerName: agentgateway.dev/agentgateway
