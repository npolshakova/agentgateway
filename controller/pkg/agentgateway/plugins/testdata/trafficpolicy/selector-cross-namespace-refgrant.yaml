apiVersion: v1
kind: Namespace
metadata:
  name: other
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: other-gw
  namespace: other
  labels:
    env: staging
spec:
  gatewayClassName: agentgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 8080
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-policy-from-default
  namespace: other
spec:
  from:
    - group: agentgateway.dev
      kind: AgentgatewayPolicy
      namespace: default
  to:
    - group: gateway.networking.k8s.io
      kind: Gateway
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: agw
  namespace: default
spec:
  targetSelectors:
  - kind: Gateway
    group: gateway.networking.k8s.io
    matchLabels:
      env: staging
  traffic:
    timeouts:
      request: 10s
---
# Output
output:
- gateway:
    Name: other-gw
    Namespace: other
  resource:
    policy:
      key: traffic/default/agw:timeout:other/other-gw
      name:
        kind: AgentgatewayPolicy
        name: agw
        namespace: default
      target:
        gateway:
          name: other-gw
          namespace: other
      traffic:
        timeout:
          request: 10s
status:
- apiVersion: agentgateway.dev/v1alpha1
  kind: AgentgatewayPolicy
  metadata:
    name: agw
    namespace: default
  spec: null
  status:
    ancestors:
    - ancestorRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: other-gw
        namespace: other
      conditions:
      - lastTransitionTime: fake
        message: Policy accepted
        reason: Valid
        status: "True"
        type: Accepted
      - lastTransitionTime: fake
        message: Attached to all targets
        reason: Attached
        status: "True"
        type: Attached
      controllerName: agentgateway.dev/agentgateway
