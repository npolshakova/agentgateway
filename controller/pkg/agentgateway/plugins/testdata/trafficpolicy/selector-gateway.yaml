apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: labeled-gw1
  namespace: default
  labels:
    env: staging
spec:
  gatewayClassName: agentgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: labeled-gw2
  namespace: default
  labels:
    env: staging
spec:
  gatewayClassName: agentgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 8080
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: agw
  namespace: default
spec:
  targetSelectors:
  - kind: Gateway
    group: gateway.networking.k8s.io
    matchLabels:
      env: staging
  traffic:
    timeouts:
      request: 30s

