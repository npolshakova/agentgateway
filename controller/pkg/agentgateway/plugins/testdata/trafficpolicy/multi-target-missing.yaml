apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: agw
  namespace: default
spec:
  targetRefs:
    - kind: Gateway
      name: test
      group: gateway.networking.k8s.io
    - kind: Gateway
      name: not-test
      group: gateway.networking.k8s.io
    - kind: Gateway
      name: not-test2
      group: gateway.networking.k8s.io
  traffic:
    retry:
      attempts: 2
---
# Output
output:
- gateway:
    Name: not-test
    Namespace: default
  resource:
    policy:
      key: traffic/default/agw:retry:default/not-test
      name:
        kind: AgentgatewayPolicy
        name: agw
        namespace: default
      target:
        gateway:
          name: not-test
          namespace: default
      traffic:
        retry:
          attempts: 2
- gateway:
    Name: not-test2
    Namespace: default
  resource:
    policy:
      key: traffic/default/agw:retry:default/not-test2
      name:
        kind: AgentgatewayPolicy
        name: agw
        namespace: default
      target:
        gateway:
          name: not-test2
          namespace: default
      traffic:
        retry:
          attempts: 2
- gateway:
    Name: test
    Namespace: default
  resource:
    policy:
      key: traffic/default/agw:retry:default/test
      name:
        kind: AgentgatewayPolicy
        name: agw
        namespace: default
      target:
        gateway:
          name: test
          namespace: default
      traffic:
        retry:
          attempts: 2
status:
- apiVersion: agentgateway.dev/v1alpha1
  kind: AgentgatewayPolicy
  metadata:
    name: agw
    namespace: default
  spec: null
  status:
    ancestors:
    - ancestorRef:
        group: agentgateway.dev
        name: StatusSummary
      conditions:
      - lastTransitionTime: fake
        message: Policy accepted
        reason: Valid
        status: "True"
        type: Accepted
      - lastTransitionTime: fake
        message: |-
          Policy is not attached: Gateway default/not-test not found
          Policy is not attached: Gateway default/not-test2 not found
        reason: Pending
        status: "False"
        type: Attached
      controllerName: agentgateway.dev/agentgateway
    - ancestorRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: test
        namespace: default
      conditions:
      - lastTransitionTime: fake
        message: Policy accepted
        reason: Valid
        status: "True"
        type: Accepted
      - lastTransitionTime: fake
        message: Attached to all targets
        reason: Attached
        status: "True"
        type: Attached
      controllerName: agentgateway.dev/agentgateway
