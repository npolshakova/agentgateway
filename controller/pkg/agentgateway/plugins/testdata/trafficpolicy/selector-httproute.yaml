apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: labeled-route
  namespace: default
  labels:
    app: api
spec:
  parentRefs:
    - name: test
  hostnames:
    - "api.example.com"
  rules:
    - backendRefs:
        - name: reviews
          port: 8080
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: agw
  namespace: default
spec:
  targetSelectors:
  - kind: HTTPRoute
    group: gateway.networking.k8s.io
    matchLabels:
      app: api
  traffic:
    timeouts:
      request: 5s

---
# Output
output:
- gateway:
    Name: test
    Namespace: default
  resource:
    policy:
      key: traffic/default/agw:timeout:default/labeled-route
      name:
        kind: AgentgatewayPolicy
        name: agw
        namespace: default
      target:
        route:
          kind: HTTPRoute
          name: labeled-route
          namespace: default
      traffic:
        timeout:
          request: 5s
status:
- apiVersion: agentgateway.dev/v1alpha1
  kind: AgentgatewayPolicy
  metadata:
    name: agw
    namespace: default
  spec: null
  status:
    ancestors:
    - ancestorRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: test
        namespace: default
      conditions:
      - lastTransitionTime: fake
        message: Policy accepted
        reason: Valid
        status: "True"
        type: Accepted
      - lastTransitionTime: fake
        message: Attached to all targets
        reason: Attached
        status: "True"
        type: Attached
      controllerName: agentgateway.dev/agentgateway
