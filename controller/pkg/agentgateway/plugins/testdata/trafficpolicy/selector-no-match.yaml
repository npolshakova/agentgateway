apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: agw
  namespace: default
spec:
  targetSelectors:
  - kind: Gateway
    group: gateway.networking.k8s.io
    matchLabels:
      env: nonexistent
  traffic:
    timeouts:
      request: 10s

---
