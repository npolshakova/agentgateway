apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ls-gw
  namespace: default
spec:
  gatewayClassName: agentgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 8081
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: labeled-ls
  namespace: default
  labels:
    tier: frontend
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: ls-gw
  listeners:
    - name: http-9090
      protocol: HTTP
      port: 9090
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: agw
  namespace: default
spec:
  targetSelectors:
  - kind: ListenerSet
    group: gateway.networking.k8s.io
    matchLabels:
      tier: frontend
  traffic:
    timeouts:
      request: 10s
---
# Output
output: []
status: []
