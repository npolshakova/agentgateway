apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: ext-auth-conditional
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: dummy
  traffic:
    transformation:
      conditional:
        - condition: "request.path == '/transform'"
          policy:
            request:
              set:
                - name: x-conditional-transform
                  value: "'enabled'"
        - policy:
            response:
              add:
                - name: x-conditional-transform
                  value: "'fallback'"
    extProc:
      conditional:
        - condition: "request.path == '/process'"
          policy:
            backendRef:
              name: extproc
              port: 4444
        - policy:
            backendRef:
              name: extproc
              port: 4444
    extAuth:
      conditional:
        - condition: "random() > .5"
          policy:
            backendRef:
              name: extauthz
              port: 1024
            grpc: {}
        - condition: "request.path == '/secure'"
          policy:
            backendRef:
              name: extauthz
              port: 1024
            grpc: {}
        - policy:
            backendRef:
              name: extauthz
              port: 1024
            grpc: {}
    rateLimit:
      conditional:
        - condition: "request.path == '/local-limit'"
          policy:
            local:
              - requests: 10
                unit: Seconds
        - condition: "request.path == '/global-limit'"
          policy:
            global:
              backendRef:
                name: ratelimit
                port: 8081
              domain: api-gateway
              descriptors:
                - entries:
                    - name: user-agent
                      expression: 'request.headers["user-agent"]'
        - policy:
            local:
              - requests: 1
                unit: Minutes
    directResponse:
      conditional:
        - condition: "request.path == '/direct'"
          policy:
            status: 403
            body: denied
        - condition: "request.path == '/gone'"
          policy:
            status: 410
---
apiVersion: v1
kind: Service
metadata:
  name: extauthz
  namespace: default
spec:
  ports:
    - port: 1024
---
apiVersion: v1
kind: Service
metadata:
  name: extproc
  namespace: default
spec:
  ports:
    - port: 4444
---
apiVersion: v1
kind: Service
metadata:
  name: ratelimit
  namespace: default
spec:
  ports:
    - port: 8081
---
