apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: agw
  namespace: default
spec:
  targetRefs:
    - kind: HTTPRoute
      name: test
      group: gateway.networking.k8s.io
  backend:
    tunnel:
      backendRef:
        name: proxy
        port: 3128
---
apiVersion: v1
kind: Service
metadata:
  name: proxy
  namespace: default
spec:
  ports:
    - port: 3128
---
# Output
output:
- gateway:
    Name: test
    Namespace: default
  resource:
    policy:
      backend:
        backendTunnel:
          proxy:
            port: 3128
            service:
              hostname: proxy.default.svc.cluster.local
              namespace: default
      key: default/agw:backend-tunnel:default/test
      name:
        kind: AgentgatewayPolicy
        name: agw
        namespace: default
      target:
        route:
          kind: HTTPRoute
          name: test
          namespace: default
status:
