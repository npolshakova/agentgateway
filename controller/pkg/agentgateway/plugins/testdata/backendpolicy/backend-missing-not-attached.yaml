# Intentionally no output. There is no backend, so nothing to attach to.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: agw
  namespace: default
spec:
  targetRefs:
  - kind: AgentgatewayBackend
    name: missing
    group: agentgateway.dev
  backend:
    tls:
      mtlsCertificateRef:
        - name: mtls
---
# Output
output: []
status:
- apiVersion: agentgateway.dev/v1alpha1
  kind: AgentgatewayPolicy
  metadata:
    name: agw
    namespace: default
  spec: null
  status:
    ancestors:
    - ancestorRef:
        group: agentgateway.dev
        name: StatusSummary
      conditions:
      - lastTransitionTime: fake
        message: Policy accepted
        reason: Valid
        status: "True"
        type: Accepted
      - lastTransitionTime: fake
        message: 'Policy is not attached: AgentgatewayBackend default/missing not
          found'
        reason: Pending
        status: "False"
        type: Attached
      controllerName: agentgateway.dev/agentgateway
